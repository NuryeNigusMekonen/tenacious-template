# Promotion-direction config. The branch-flow job (governance.yml) reads this
# and fails any PR that merges in the wrong direction.
# Set 'model' to one preset: trunk | dev-main | dev-staging-main.

model: dev-staging-main

# Advanced: instead of 'model', declare a 'flow' map (TARGET: [allowed SOURCES]):
# flow:
#   main:    [staging, "hotfix/*"]
#   staging: [dev]
#   dev:     ["feature/*", "fix/*", "hotfix/*"]
