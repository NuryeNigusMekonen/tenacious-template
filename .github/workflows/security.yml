# Security - one gate for everything whose goal is finding vulnerabilities and
# leaked credentials.
#
#   - secret-scan : Gitleaks + zero-dep scanner (always runs, text-based)
#   - sast        : Semgrep static analysis via `make sast` (per PR)
#   - security    : single REQUIRED status check gating the two jobs above
#
# Semgrep is the project's one static-analysis tool. It is multi-language
# (covers Python, JS/TS, Go, etc.) and runs on every PR/push via `make sast`,
# so local and CI behaviour stay identical.
#
# The "security" job name is load-bearing: scripts/setup-branch-protection.sh
# requires it by name. Do not rename it without updating that script.
name: security

on:
  pull_request:           # gate every PR (secret-scan, sast, security)
  push:
    branches: ["**"]      # also catch direct pushes to any branch (no PR)

permissions:
  contents: read

jobs:
  # --- Secret scanning (always runs - a leaked secret hurts any project) -------
  secret-scan:
    # Primary: Gitleaks (the OSS standard, entropy + rules). Fallback: the
    # zero-dep kit scanner, which always runs so protection holds with no extra
    # tooling. Both are language-agnostic (text-based).
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (primary secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # GITLEAKS_LICENSE only needed for org-owned repos; omit for personal.
        continue-on-error: true   # zero-dep scanner below is the hard gate
      - name: Zero-dep scanner (always runs, hard gate)
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files || true)
          if [ ${#files[@]} -gt 0 ] && [ -f scripts/secret-scan.sh ]; then
            bash scripts/secret-scan.sh "${files[@]}"
          else
            echo "secret-scan: no scanner script or no files; skipping."
          fi

  # --- SAST (Semgrep static analysis, per PR) ----------------------------------
  # Semgrep is the single SAST tool (see `make sast`). Runs on every PR/push.
  sast:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: SAST (make sast)
        run: make sast

  # --- Security gate (single REQUIRED status check) ----------------------------
  # Passes only when BOTH secret-scan and sast succeed. `if: always()` so the
  # gate still runs (and fails) even when a dependency fails rather than being
  # skipped along with it.
  security:
    name: security
    needs: [secret-scan, sast]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Gate
        run: |
          set -euo pipefail
          echo "secret-scan: ${{ needs.secret-scan.result }}"
          echo "sast: ${{ needs.sast.result }}"
          if [ "${{ needs.secret-scan.result }}" != "success" ]; then
            echo "::error::Secret scan failed."; exit 1
          fi
          if [ "${{ needs.sast.result }}" != "success" ]; then
            echo "::error::SAST failed."; exit 1
          fi
          echo "Security checks passed."
