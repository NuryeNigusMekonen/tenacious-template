# Finds leaked credentials and vulnerabilities: secret-scan (Gitleaks + zero-dep
# scanner) and sast (Semgrep via `make sast`), gated by a single "security" check.
# It runs on every push/PR; mark it a required check in branch protection if your
# plan supports it (private repos need a paid plan to enforce required checks).
name: security

on:
  pull_request:
  push:
    branches: ["**"]      # also catch direct pushes (no PR)

permissions:
  contents: read

jobs:
  # Secret scanning: Gitleaks (primary) + zero-dep scanner (hard gate, always runs).
  secret-scan:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (primary secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # GITLEAKS_LICENSE only needed for org-owned repos; omit for personal.
        continue-on-error: true   # zero-dep scanner below is the hard gate
      - name: Zero-dep scanner (always runs, hard gate)
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files || true)
          if [ ${#files[@]} -gt 0 ] && [ -f scripts/secret-scan.sh ]; then
            bash scripts/secret-scan.sh "${files[@]}"
          else
            echo "secret-scan: no scanner script or no files; skipping."
          fi

  # SAST: Semgrep via `make sast`.
  sast:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: SAST (make sast)
        run: make sast

  # REQUIRED gate: passes only when both secret-scan and sast succeed.
  # if: always() so it still runs (and fails) when a dependency fails.
  security:
    name: security
    needs: [secret-scan, sast]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Gate
        run: |
          set -euo pipefail
          echo "secret-scan: ${{ needs.secret-scan.result }}"
          echo "sast: ${{ needs.sast.result }}"
          if [ "${{ needs.secret-scan.result }}" != "success" ]; then
            echo "::error::Secret scan failed."; exit 1
          fi
          if [ "${{ needs.sast.result }}" != "success" ]; then
            echo "::error::SAST failed."; exit 1
          fi
          echo "Security checks passed."
