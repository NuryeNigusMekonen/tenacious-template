# Governance - one place for everything whose goal is governing HOW changes flow
# through the repo (not whether the code is good - that's quality.yml).
#
#   - branch-flow             : enforce promotion direction from .github/branch-flow.yml (REQUIRED check)
#   - auto-label              : label PRs by the files they touch
#   - smart-comments          : advisory review hints
#   - cleanup-stale-branches  : weekly stale-branch sweep
#
# These never merge, release, or override a human decision. Versioning is owned
# by release.yml, commit-title + code-quality checks by quality.yml, secret
# scanning + Semgrep SAST by security.yml, reviewer routing by CODEOWNERS - this
# file does not duplicate them.
#
# The "branch-flow" job name is load-bearing: scripts/setup-branch-protection.sh
# requires it by name. Do not rename it without updating that script.
name: governance

on:
  pull_request:
    # Include 'reopened' and 'edited' so the branch-flow direction gate (a
    # REQUIRED check) re-runs when a PR is reopened or its base branch changes -
    # otherwise an illegal direction could slip through on a stale pass. The
    # label/comment jobs are harmless on these events too.
    types: [opened, synchronize, reopened, edited]
  schedule:
    - cron: "0 0 * * SUN"   # weekly stale-branch sweep, Sunday 00:00 UTC

# Least-privilege: just enough to label PRs, comment, and delete merged branches.
permissions:
  contents: write          # delete stale branches
  pull-requests: write     # add labels
  issues: write            # post comments (PR comments use the issues API)

jobs:
  # --- Direction gate: enforce the promotion flow (REQUIRED check) -------------
  # Enforces the directional rule branch protection can't: code must flow in the
  # declared promotion direction with no skipping. The allowed flow is NOT
  # hardcoded here - it is read from .github/branch-flow.yml, so each project
  # declares its own model (e.g. feature->dev->staging->main, or feature->dev->main)
  # without editing this workflow. Fails a PR whose SOURCE branch isn't an allowed
  # source for its TARGET. If the config is missing/empty, no rule is applied.
  # Honest scope: strong guard against accidental jumps, but a determined admin
  # can still bypass CI.
  branch-flow:
    name: branch-flow
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate the merge direction against .github/branch-flow.yml
        env:
          SRC: ${{ github.head_ref }}    # branch the PR is FROM
          DST: ${{ github.base_ref }}    # branch the PR is INTO
        run: |
          set -euo pipefail
          pip install pyyaml >/dev/null 2>&1 || true
          python3 - <<'PY'
          import os, sys, fnmatch
          src, dst = os.environ["SRC"], os.environ["DST"]
          print(f"PR direction: '{src}' -> '{dst}'")

          cfg_path = ".github/branch-flow.yml"
          if not os.path.exists(cfg_path):
              print(f"No {cfg_path}; branch-flow applies no direction rule."); sys.exit(0)

          import yaml
          with open(cfg_path) as f:
              data = yaml.safe_load(f) or {}

          # Named presets - the simple path: one line `model: <name>`.
          # fix/* and hotfix/* ride alongside feature/*; hotfix/* may also go
          # straight to main on the multi-stage models.
          PRESETS = {
              "trunk": {
                  "main": ["feature/*", "fix/*", "hotfix/*"],
              },
              "dev-main": {
                  "main": ["dev", "hotfix/*"],
                  "dev":  ["feature/*", "fix/*", "hotfix/*"],
              },
              "dev-staging-main": {
                  "main":    ["staging", "hotfix/*"],
                  "staging": ["dev", "hotfix/*"],
                  "dev":     ["feature/*", "fix/*", "hotfix/*"],
              },
          }

          model = (data.get("model") or "").strip()
          if model:
              if model not in PRESETS:
                  print(f"::warning::Unknown model '{model}' in {cfg_path} "
                        f"(expected: {', '.join(PRESETS)}). No direction rule applied.")
                  sys.exit(0)
              flow = PRESETS[model]
              print(f"Using preset model: {model}")
          else:
              # Advanced path: explicit flow map.
              flow = data.get("flow") or {}
              if not flow:
                  print("No 'model' or 'flow' set; no direction rule applied."); sys.exit(0)
              print("Using explicit 'flow' rules.")

          # Targets not listed are ungated.
          if dst not in flow:
              print(f"OK: target '{dst}' is not a gated branch; no rule applied."); sys.exit(0)

          allowed = flow[dst] or []
          for pat in allowed:
              # exact match, or trailing-* glob (feature/*)
              if src == pat or fnmatch.fnmatch(src, pat):
                  print(f"OK: {src} -> {dst} is allowed (matched '{pat}')."); sys.exit(0)

          allowed_str = ", ".join(allowed) or "(none)"
          print(f"::error::Illegal merge direction. '{dst}' may only receive from: "
                f"{allowed_str}. Got '{src}'. Follow the promotion flow in "
                f".github/branch-flow.yml; do not skip stages.")
          sys.exit(1)
          PY

  # --- Auto-label a PR by the kinds of files it touches ------------------------
  auto-label:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    steps:
      - name: Label by file changes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const labels = [];
            for (const file of files) {
              const f = file.filename;
              if (/\.(py|java|js|ts|jsx|tsx|go|rs)$/.test(f)) labels.push('code');
              if (/\.md$/.test(f)) labels.push('documentation');
              if (/(test|spec)/i.test(f)) labels.push('testing');
              if (/(\.github|\.ya?ml|Makefile)/.test(f)) labels.push('ci-cd');
              if (/(security|auth|crypto|secret)/i.test(f)) labels.push('security');
              if (/(requirements|pyproject|package\.json|go\.mod|Cargo\.toml)/.test(f)) labels.push('dependencies');
            }

            const unique = [...new Set(labels)];
            if (unique.length) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: unique,
              });
              console.log(`Applied labels: ${unique.join(', ')}`);
            }

  # --- Post context-aware review hints (advisory comment) ----------------------
  smart-comments:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    steps:
      - name: Add review hints
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            let comment = '';
            if (pr.changed_files > 50) comment += '- Large PR (50+ files) - consider splitting for safer review.\n';
            if (pr.additions > 500 || pr.deletions > 500) comment += '- Large change (500+ lines) - review carefully.\n';
            if (pr.labels.some(l => l.name === 'security')) comment += '- Touches security-sensitive files - ensure the right reviewer is on it.\n';
            if (pr.labels.some(l => l.name === 'dependencies')) comment += '- Dependency change - verify no version conflicts.\n';

            if (comment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `### Review hints\n\n${comment}`,
              });
            }

  # --- Weekly stale-branch cleanup (safe: protects the real flow) --------------
  cleanup-stale-branches:
    if: github.event_name == 'schedule'
    runs-on: self-hosted
    steps:
      - name: Delete branches with no commits in 30+ days
        uses: actions/github-script@v7
        with:
          script: |
            // Never delete the protected stages of THIS template's flow.
            const PROTECTED = new Set(['main', 'dev', 'staging']);
            const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            // Branches that have an OPEN PR must not be deleted.
            const openPRs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const branchesWithOpenPR = new Set(openPRs.map(pr => pr.head.ref));

            let deleted = 0;
            for (const branch of branches) {
              if (PROTECTED.has(branch.name)) continue;
              if (branch.protected) continue;                 // honour branch protection
              if (branchesWithOpenPR.has(branch.name)) continue;

              const { data: commit } = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: branch.commit.sha,
              });
              const when = new Date(commit.commit.committer.date).getTime();
              if (when >= cutoff) continue;

              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branch.name}`,
                });
                console.log(`Deleted stale branch: ${branch.name}`);
                deleted++;
              } catch (e) {
                console.log(`Could not delete ${branch.name}: ${e.message}`);
              }
            }
            console.log(`Cleanup complete: ${deleted} branch(es) deleted.`);
