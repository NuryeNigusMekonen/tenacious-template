# Advisory code-quality checks: Conventional-Commit PR title, oversized-PR
# warning, and duplicate-code detection. None block merges.
name: quality

on:
  pull_request:

permissions:
  contents: read

env:
  MAX_CHANGED_FILES: "40"     # PRs larger than this are flagged (tune per team)
  MAX_CHANGED_LINES: "800"

jobs:
  # Conventional-Commit PR title (advisory; keeps history readable).
  pr-title:
    runs-on: self-hosted
    steps:
      - name: Check PR title is a conventional commit
        run: |
          set -euo pipefail
          title="${{ github.event.pull_request.title }}"
          # type(scope)?: subject   - types per Conventional Commits.
          if echo "$title" | grep -Eq '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9_-]+\))?!?: .+'; then
            echo "PR title OK: $title"
          else
            echo "::warning::PR title '$title' is not a Conventional Commit (e.g. 'feat: add X' or 'fix(auth): handle Y'). Keeps history readable."
          fi

  # PR size warning (advisory).
  pr-size:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check PR size
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          files=$(git diff --name-only "$base" HEAD | wc -l | tr -d ' ')
          lines=$(git diff --numstat "$base" HEAD | awk '{a+=$1; d+=$2} END {print a+d+0}')
          echo "Changed files: $files (limit ${MAX_CHANGED_FILES})"
          echo "Changed lines: $lines (limit ${MAX_CHANGED_LINES})"
          if [ "$files" -gt "${MAX_CHANGED_FILES}" ] || [ "$lines" -gt "${MAX_CHANGED_LINES}" ]; then
            echo "::warning::This PR is large (${files} files, ${lines} lines). Consider splitting it for safer review."
          fi

  # Duplicate-code detection (advisory). Always reports a clear detected/clean
  # result via a warning annotation + the job Step Summary.
  duplicate-code:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7
      - name: Duplicate code (jscpd)
        run: |
          set -uo pipefail
          # Run jscpd; JSON report drives the notification, console for the log.
          # `|| true` so a non-zero exit never fails this advisory job - we read
          # the report to decide the outcome instead.
          npx --yes jscpd . --min-lines 10 --threshold 5 \
            --reporters consoleFull,json --output .jscpd >/dev/null 2>&1 || true

          report=".jscpd/jscpd-report.json"
          if [ ! -f "$report" ]; then
            msg="duplicate-code: jscpd did not produce a report (skipped or errored)."
            echo "::warning::$msg"
            echo "$msg" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Read statistics.total.clones from the report (0 if absent).
          clones=$(python3 -c "import json,sys; print(json.load(open('$report')).get('statistics',{}).get('total',{}).get('clones',0))" 2>/dev/null || echo 0)
          clones=${clones:-0}

          if [ "$clones" -gt 0 ]; then
            msg="duplicate-code: detected ${clones} duplicate block(s) (advisory). See the jscpd output above."
            echo "::warning::$msg"
            echo "⚠️ $msg" >> "$GITHUB_STEP_SUMMARY"
          else
            msg="duplicate-code: clean - no duplicate blocks detected."
            echo "$msg"
            echo "✅ $msg" >> "$GITHUB_STEP_SUMMARY"
          fi
