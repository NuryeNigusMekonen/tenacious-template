# gitleaks config - used by the local hooks IF gitleaks is
# installed, and by CI if enabled. Extends the built-in ruleset; adds a
# repo-specific rule + allowlist. The zero-dep scanner runs regardless, so
# gitleaks is optional (fuller coverage when present).
title = "tenacious gitleaks config"

[extend]
useDefault = true

# --- repo-specific rules ------------------------------------------------------
[[rules]]
id = "db-connection-uri-with-password"
description = "Database/broker connection URI carrying an inline password"
regex = '''(postgres(ql)?|mysql|mariadb|mongodb(\+srv)?|amqps?|rediss?)(\+[a-z0-9]+)?://[^:/?#@\s]+:[^@/?#\s]{3,}@'''
tags = ["database", "credentials"]

# --- allowlist ----------------------------------------------------------------
[allowlist]
description = "Placeholders, dev defaults, and files that describe secret patterns"
# Keep this set aligned with ALLOWLIST_PATHS_RE in scripts/secret-scan.sh so both
# scanners agree on which files legitimately hold placeholders / lockfile hashes.
paths = [
  '''.*\.env\.example$''',
  '''.*\.env\.template$''',
  '''.*\.gitleaks\.toml$''',
  '''.*/secret-scan\.sh$''',
  '''(.*/)?security\.yml$''',
  '''.*/pull_request_template\.md$''',
  '''(.*/)?package-lock\.json$''',
  '''(.*/)?pnpm-lock\.yaml$''',
  '''(.*/)?yarn\.lock$''',
  '''(.*/)?uv\.lock$''',
  '''(.*/)?AGENTS\.md$''',
  '''(.*/)?README\.md$''',
  '''(.*/)?CONTRIBUTING\.md$''',
  '''(.*/)?SECURITY\.md$''',
]
regexes = [
  '''\$\{[A-Z0-9_]+(:-[^}]*)?\}''',
  '''(REPLACE|EXAMPLE|changeme|your[-_]|placeholder|dummy|REDACTED)''',
]
